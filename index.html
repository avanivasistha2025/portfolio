<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avani Vasistha | Portfolio</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header class="card header-card">
        <h1>Avani Vasistha</h1>
        <p>Engineering Student | Developer</p>
    </header>

    <!-- ABOUT -->
    <div class="card">
        <button class="accordion"><i data-lucide="user"></i> About Me</button>
        <div class="panel">
            <p>Your about content here...</p>
        </div>
    </div>

    <!-- SKILLS -->
    <div class="card">
        <button class="accordion"><i data-lucide="cpu"></i> Skills</button>
        <div class="panel">
            <p>Your skills content here...</p>
        </div>
    </div>

    <!-- PROJECTS -->
    <div class="card">
        <button class="accordion"><i data-lucide="folder"></i> Projects</button>

        <div class="panel">

            <div class="project-item" data-target="p1">
                <i data-lucide="activity"></i> Smart Sensor System
            </div>
            <div id="p1" class="project-content">
                <p>Project details here...</p>
            </div>

            <div class="project-item" data-target="p2">
                <i data-lucide="battery-charging"></i> EV Charger
            </div>
            <div id="p2" class="project-content">
                <p>Project details here...</p>
            </div>

        </div>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Accordion
    document.querySelectorAll(".accordion").forEach(button => {
        button.addEventListener("click", function () {
            const panel = this.nextElementSibling;

            if (panel.style.maxHeight) {
                panel.style.maxHeight = null;
            } else {
                panel.style.maxHeight = panel.scrollHeight + "px";
            }
        });
    });

    // Project toggles
    document.querySelectorAll(".project-item").forEach(item => {
        item.addEventListener("click", function () {
            const target = document.getElementById(this.dataset.target);

            if (target.style.maxHeight) {
                target.style.maxHeight = null;
            } else {
                target.style.maxHeight = target.scrollHeight + "px";
            }
        });
    });

    // Icons
    lucide.createIcons();
});
</script>

</body>
</html>
